quarkus.http.port=8081
quarkus.http.test-port=8181

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=reservation_service
quarkus.datasource.password=reservation_password
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/reservation_db

quarkus.hibernate-orm.database.generation=drop-and-create

quarkus.oidc.application-type=service
quarkus.oidc.auth-server-url=http://localhost:7777/realms/car-rental
quarkus.oidc.client-id=reservation-service
quarkus.oidc.token-state-manager.split-tokens=true

quarkus.smallrye-graphql-client.inventory.url=http://localhost:8083/graphql
