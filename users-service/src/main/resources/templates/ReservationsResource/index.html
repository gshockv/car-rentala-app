{@java.lang.String name}
{@java.time.LocalDate startDate}
{@java.time.LocalDate endDate}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
        crossorigin="anonymous">

  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>

  <title>Reservations App</title>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Car Reservations App</a>
    <div class="d-flex">
      <span class="navbar-text">User: {name}</span>&nbsp;&nbsp;&nbsp;
      <a href="/logout" class="navbar-text">Log out</a>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <!-- Available Cars -->
  <h5>Available cars</h5>
  <div class="p-2">
    <form
      hx-get="/available"
      hx-target="#availability">

      <div class="input-group">
        <span class="input-group-text">Start date</span>
        <input
          id="startDateInput"
          class="form-control rounded-end"
          type="date"
          name="startDate"
          value="{startDate}"/>
        &nbsp;
        <span class="input-group-text rounded-start">End date</span>
        <input
          id="endDateInput"
          class="form-control rounded-end"
          type="date"
          name="endDate"
          value="{endDate}"/>
        <input type="submit" class="btn btn-primary ms-2 rounded" value="Update list">
      </div>
    </form>
    <div id="availability"
         class="mt-3"
         hx-get="/available"
         hx-trigger="load, update-available-cars-list from:body"
         hx-include="[id='startDateInput'],[id=endDateInput]"
    >
      <!-- to be replaced with server side response -->
    </div>
  </div>

  <!-- Reservations List -->
  <div class="mt-4">
    <h5>List of Reservations</h5>
    <div
      id="reservations"
      class="mt-3"
      hx-get="/get"
      hx-trigger="load">
      <!-- to be replaced with server side response -->
    </div>

  </div>
</div>

</body>
</html>
